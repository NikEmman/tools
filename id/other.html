<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <title>Multi-PDF OCR Parser (Fixed CORS)</title>
    <script src="../libs/pdfjs-3.11.174/pdf.min.js"></script>
    <script src="../libs/tesseract5/tesseract.min.js"></script>
    <script
      async
      src="../libs/opencv/opencv-1.2.1.min.js"
      onload="onOpenCvReady()"
    ></script>

    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 1100px;
        margin: 20px auto;
        background: #f4f7f6;
        padding: 0 20px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }
      #drop-zone {
        border: 3px dashed #3498db;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        background: #f0f9ff;
        transition: 0.3s;
      }
      #drop-zone:hover {
        background: #e0f2fe;
        border-color: #2980b9;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      #status {
        font-weight: bold;
        color: #2980b9;
        margin: 10px 0;
      }
      #debug-console {
        width: 100%;
        height: 500px;
        background: #1e1e1e;
        color: #33ff33;
        font-family: monospace;
        padding: 15px;
        border-radius: 8px;
        font-size: 13px;
      }
      #results {
        font-size: 1.2rem;
        line-height: 1.8;
        color: #2c3e50;
      }
      .match-badge {
        background: #27ae60;
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      .fail-badge {
        background: #e74c3c;
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      canvas {
        display: none;
      }
      #preview-canvas {
        display: block;
        max-width: 100%;
        border: 1px solid #ccc;
        margin: 10px 0;
      }
      .preview-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
        flex-wrap: wrap;
      }
      .preview-controls button {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
      }
      .preview-controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-rotate {
        background: #3498db;
        color: white;
      }
      .btn-rotate:hover:not(:disabled) {
        background: #2980b9;
      }
      .btn-process {
        background: #27ae60;
        color: white;
        font-weight: bold;
      }
      .btn-process:hover:not(:disabled) {
        background: #219a52;
      }
      #page-info {
        font-weight: bold;
        min-width: 100px;
        text-align: center;
      }
      #file-list {
        margin: 10px 0;
        max-height: 150px;
        overflow-y: auto;
      }
      .file-item {
        padding: 8px;
        margin: 4px 0;
        background: #f0f0f0;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .file-item:hover {
        background: #e0e0e0;
      }
      .file-item.active {
        background: #d4edda;
        border: 1px solid #28a745;
      }
      #preview-section {
        display: none;
      }
      #preview-section.visible {
        display: block;
      }
      .crop-controls {
        display: flex;
        gap: 20px;
        margin: 10px 0;
        align-items: center;
        flex-wrap: wrap;
      }
      .crop-controls label {
        font-size: 13px;
      }
      .crop-controls input[type="range"] {
        width: 120px;
      }
      .crop-controls span {
        font-weight: bold;
        min-width: 35px;
      }
      #preview-canvas-wrap {
        position: relative;
        display: inline-block;
      }
      .crop-line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #e74c3c;
        pointer-events: none;
      }
      .crop-line.L {
        left: 0;
      }
      .crop-line.R {
        right: 0;
      }
      #preview-canvas-wrap {
        position: relative;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div style="margin-bottom:1rem;">
      <a href="index.html" style="font-size:0.8rem;color:#555;text-decoration:none;border:1px solid #aaa;padding:0.25rem 0.65rem;border-radius:4px;">← Other tool</a>
    </div>
    <div class="card">
      <h2>Greek Department PDF Parser</h2>
      <div
        id="drop-zone"
        onclick="document.getElementById('file-input').click()"
      >
        <strong>Drag PDFs here or Click to Browse</strong>
        <input
          type="file"
          id="file-input"
          accept="application/pdf"
          multiple
          style="display: none"
        />
      </div>
      <div id="status">Status: Loading Libraries...</div>
    </div>

    <div id="preview-section" class="card">
      <h3>Preview & Rotation</h3>
      <div id="file-list"></div>
      <div class="preview-controls">
        <button id="btn-prev-page" class="btn-rotate" onclick="prevPage()">
          ← Previous
        </button>
        <span id="page-info">Page 1 of 1</span>
        <button id="btn-next-page" class="btn-rotate" onclick="nextPage()">
          Next →
        </button>
        <button class="btn-rotate" onclick="rotateLeft()">↺ Rotate Left</button>
        <button class="btn-rotate" onclick="rotateRight()">
          ↻ Rotate Right
        </button>
        <button id="btn-process" class="btn-process" onclick="startOcr()">
          ▶ Start OCR
        </button>
      </div>
      <div class="crop-controls">
        <label>Column: Left <span id="cropL-val">0</span>%</label>
        <input type="range" id="cropL" min="0" max="95" value="0" />
        <label>Right <span id="cropR-val">100</span>%</label>
        <input type="range" id="cropR" min="5" max="100" value="100" />
      </div>
      <div id="preview-canvas-wrap">
        <canvas id="preview-canvas"></canvas>
        <div class="crop-line L" id="crop-line-L" style="left: 0%"></div>
        <div class="crop-line R" id="crop-line-R" style="right: 0%"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>📊 Statistics</h3>
        <div id="results">Waiting for documents...</div>
      </div>
      <div class="card">
        <h3>🔍 Raw OCR Console</h3>
        <textarea
          id="debug-console"
          readonly
          placeholder="Raw text will stream here..."
        ></textarea>
      </div>
    </div>

    <canvas id="pdf-canvas"></canvas>
    <canvas id="proc-canvas"></canvas>

    <script>
      const DEPARTMENTS = {
        ΚΟΜΟΤΗΝΗΣ: "Τ.Δ.Ε.Ε. ΚΟΜΟΤΗΝΗΣ",
        ΣΑΠΩΝ: "Α.Τ. ΣΑΠΩΝ",
        ΙΑΣΜΟΥ: "Α.Τ. ΙΑΣΜΟΥ",
        ΑΡΡΙΑΝΩΝ: "Α.Τ. ΑΡΡΙΑΝΩΝ",
      };

      let totals = {};
      let cvReady = false;

      let uploadedFiles = [];
      let currentFileIndex = 0;
      let currentPageIndex = 0;
      let pdfCache = {};
      let cropL = 0;
      let cropR = 100;

      // Fix for the Worker Error: Initialize Tesseract with explicit paths
      const initTesseract = async () => {
        const worker = await Tesseract.createWorker("ell", 1, {
          workerPath: "../libs/tesseract5/worker.min.js",
          langPath: "../libs/tessdata-4.0.0_best",
          corePath: "../libs/tesseract5/tesseract-core-simd.wasm.js",
          logger: (m) => {
            if (m.status === "recognizing text") {
              document.getElementById("status").innerText =
                `Reading: ${Math.round(m.progress * 100)}%`;
            }
          },
        });
        await worker.setParameters({
          tessedit_pageseg_mode: "3",
          tessedit_char_whitelist: "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ0123456789.-, ",
        });
        return worker;
      };

      function onOpenCvReady() {
        cvReady = true;
        document.getElementById("status").innerText =
          "System Ready. Please upload files.";
      }

      document.getElementById("cropL").addEventListener("input", (e) => {
        cropL = parseInt(e.target.value);
        document.getElementById("cropL-val").textContent = cropL;
        updateCropLines();
      });

      document.getElementById("cropR").addEventListener("input", (e) => {
        cropR = parseInt(e.target.value);
        document.getElementById("cropR-val").textContent = cropR;
        updateCropLines();
      });

      function updateCropLines() {
        const wrap = document.getElementById("preview-canvas-wrap");
        const canvas = document.getElementById("preview-canvas");
        const lineL = document.getElementById("crop-line-L");
        const lineR = document.getElementById("crop-line-R");

        const canvasRect = canvas.getBoundingClientRect();
        const wrapRect = wrap.getBoundingClientRect();

        const canvasLeft = canvasRect.left - wrapRect.left;
        const canvasRight = canvasRect.right - wrapRect.left;
        const canvasWidth = canvasRect.width;

        lineL.style.left = canvasLeft + (canvasWidth * cropL) / 100 + "px";
        lineR.style.left = canvasLeft + (canvasWidth * cropR) / 100 + "px";
        lineR.style.right = "auto";
      }

      document
        .getElementById("file-input")
        .addEventListener("change", async (e) => {
          if (!cvReady) return alert("OpenCV is still loading...");
          const files = Array.from(e.target.files);
          if (files.length === 0) return;

          uploadedFiles = [];
          currentFileIndex = 0;
          currentPageIndex = 0;
          pdfCache = {};

          for (const file of files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer })
              .promise;
            const pages = [];
            for (let i = 1; i <= pdfDoc.numPages; i++) {
              pages.push({ rotation: 0 });
            }
            uploadedFiles.push({
              file: file,
              pdf: pdfDoc,
              pages: pages,
            });
          }

          renderFileList();
          document.getElementById("preview-section").classList.add("visible");
          await renderPreview();
          updateControls();
        });

      function renderFileList() {
        const list = document.getElementById("file-list");
        list.innerHTML = uploadedFiles
          .map(
            (f, i) =>
              `<div class="file-item ${i === currentFileIndex ? "active" : ""}" onclick="selectFile(${i})">
            <span>${f.file.name}</span>
            <small>${f.pages.length} page(s)</small>
          </div>`,
          )
          .join("");
      }

      function selectFile(index) {
        currentFileIndex = index;
        currentPageIndex = 0;
        renderFileList();
        renderPreview();
        updateControls();
      }

      async function renderPreview() {
        if (uploadedFiles.length === 0) return;

        const fileData = uploadedFiles[currentFileIndex];
        const page = await fileData.pdf.getPage(currentPageIndex + 1);
        const rotation = fileData.pages[currentPageIndex].rotation;

        const canvas = document.getElementById("preview-canvas");
        const ctx = canvas.getContext("2d");
        const viewport = page.getViewport({ scale: 1.5 });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

        if (rotation !== 0) {
          const tempCanvas = document.createElement("canvas");
          const tempCtx = tempCanvas.getContext("2d");

          let newWidth = canvas.width;
          let newHeight = canvas.height;
          if (rotation === 90 || rotation === 270) {
            newWidth = canvas.height;
            newHeight = canvas.width;
          }

          tempCanvas.width = newWidth;
          tempCanvas.height = newHeight;

          tempCtx.translate(newWidth / 2, newHeight / 2);
          tempCtx.rotate((rotation * Math.PI) / 180);
          tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);

          canvas.width = newWidth;
          canvas.height = newHeight;
          ctx.drawImage(tempCanvas, 0, 0);
        }

        updateCropLines();
      }

      function updateControls() {
        if (uploadedFiles.length === 0) return;

        const fileData = uploadedFiles[currentFileIndex];
        const totalPages = fileData.pages.length;

        document.getElementById("page-info").textContent =
          `Page ${currentPageIndex + 1} of ${totalPages}`;
        document.getElementById("btn-prev-page").disabled =
          currentPageIndex === 0;
        document.getElementById("btn-next-page").disabled =
          currentPageIndex === totalPages - 1;
      }

      function prevPage() {
        if (currentPageIndex > 0) {
          currentPageIndex--;
          renderPreview();
          updateControls();
        }
      }

      function nextPage() {
        const fileData = uploadedFiles[currentFileIndex];
        if (currentPageIndex < fileData.pages.length - 1) {
          currentPageIndex++;
          renderPreview();
          updateControls();
        }
      }

      function rotateLeft() {
        if (uploadedFiles.length === 0) return;
        const fileData = uploadedFiles[currentFileIndex];
        fileData.pages[currentPageIndex].rotation =
          (fileData.pages[currentPageIndex].rotation - 90 + 360) % 360;
        renderPreview();
      }

      function rotateRight() {
        if (uploadedFiles.length === 0) return;
        const fileData = uploadedFiles[currentFileIndex];
        fileData.pages[currentPageIndex].rotation =
          (fileData.pages[currentPageIndex].rotation + 90) % 360;
        renderPreview();
      }

      async function startOcr() {
        if (uploadedFiles.length === 0) return alert("No files loaded");

        totals = {
          "Τ.Δ.Ε.Ε. ΚΟΜΟΤΗΝΗΣ": 0,
          "Α.Τ. ΣΑΠΩΝ": 0,
          "Α.Τ. ΙΑΣΜΟΥ": 0,
          "Α.Τ. ΑΡΡΙΑΝΩΝ": 0,
        };
        document.getElementById("debug-console").value =
          "Initializing Worker...\n";

        const worker = await initTesseract();

        for (const fileData of uploadedFiles) {
          logDebug(`\n>>> FILE: ${fileData.file.name}`);

          for (let i = 1; i <= fileData.pdf.numPages; i++) {
            document.getElementById("status").innerText =
              `Processing ${fileData.file.name} (P${i}/${fileData.pdf.numPages})`;

            const page = await fileData.pdf.getPage(i);
            const rotation = fileData.pages[i - 1].rotation;

            const canvas = await renderPageToCanvas(page, rotation);
            enhanceForOcr(canvas);

            const procCanvas = document.getElementById("proc-canvas");
            const {
              data: { text },
            } = await worker.recognize(procCanvas);

            logDebug(`-- Page ${i} Raw Text --\n${text}`);
            parseLogic(text);
          }
        }

        await worker.terminate();
        renderResults();
        document.getElementById("status").innerText = "Batch Completed.";
      }

      async function renderPageToCanvas(page, rotation = 0, applyCrop = true) {
        const viewport = page.getViewport({ scale: 2.5 });
        const canvas = document.getElementById("pdf-canvas");
        const context = canvas.getContext("2d");

        let renderWidth = viewport.width;
        let renderHeight = viewport.height;

        if (rotation === 90) {
          canvas.width = viewport.height;
          canvas.height = viewport.width;
          context.translate(viewport.height, 0);
          context.rotate(Math.PI / 2);
        } else if (rotation === 180) {
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          context.translate(viewport.width, viewport.height);
          context.rotate(Math.PI);
        } else if (rotation === 270) {
          canvas.width = viewport.height;
          canvas.height = viewport.width;
          context.translate(0, viewport.width);
          context.rotate(-Math.PI / 2);
        } else {
          canvas.width = viewport.width;
          canvas.height = viewport.height;
        }

        await page.render({ canvasContext: context, viewport: viewport })
          .promise;

        if (applyCrop && (cropL > 0 || cropR < 100)) {
          const tempCanvas = document.createElement("canvas");
          const tempCtx = tempCanvas.getContext("2d");
          const x0 = Math.floor((canvas.width * cropL) / 100);
          const x1 = Math.floor((canvas.width * cropR) / 100);
          const cw = x1 - x0;

          tempCanvas.width = cw;
          tempCanvas.height = canvas.height;
          tempCtx.drawImage(
            canvas,
            x0,
            0,
            cw,
            canvas.height,
            0,
            0,
            cw,
            canvas.height,
          );

          canvas.width = cw;
          context.drawImage(tempCanvas, 0, 0);
        }

        return canvas;
      }
      function enhanceForOcr(sourceCanvas) {
        let src = cv.imread(sourceCanvas);
        let dst = new cv.Mat();

        // 1. Grayscale (no automatic rotation - user controls it in preview)
        cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY, 0);

        // 2. Σταθερό Threshold (Όχι Adaptive)
        cv.threshold(src, dst, 150, 255, cv.THRESH_BINARY);

        cv.imshow("proc-canvas", dst);
        src.delete();
        dst.delete();
      }
      function parseLogic(text) {
        const lines = text.split("\n");
        lines.forEach((line) => {
          // Standardize: Uppercase and remove ALL punctuation/spaces for the check
          const cleanLine = line.toUpperCase().replace(/[\s\.\,]/g, "");

          if (
            cleanLine.length < 3 ||
            /ΝΕΖΒ|ΠΙΜΑΡ|2026|ΣΕΛΙΔ|ΑΘ[0-9]/.test(cleanLine)
          )
            return;

          // 1. KOMOTINI (Targeting the prefix noise)
          if (/[ΤΔΑ]+[ΕΙΑΔ]*ΚΟΜΟΤΗΝ/.test(cleanLine)) {
            totals["Τ.Δ.Ε.Ε. ΚΟΜΟΤΗΝΗΣ"]++;
          }
          // 2. SAPES (OCR often swaps O/Ω or P/R)
          else if (/ΣΑΠ[ΩΟ]Ν|ΑΤΣΑΠ|ΤΑΕΕΓΟΜ/.test(cleanLine)) {
            // Added ΤΑΕΕΓΟΜ because your OCR had "ΤΑΕΕ ΓΟΜΟΤΗΝΗΣ"
            // but usually, that counts toward Komotini? If it's a Sapes line, keep it here.
            totals["Α.Τ. ΣΑΠΩΝ"]++;
          }
          // 3. ARRIANA
          else if (/ΑΡΡΙΑΝ|ΑΤ?[ΑΔ]ΡΡ/.test(cleanLine)) {
            totals["Α.Τ. ΑΡΡΙΑΝΩΝ"]++;
          }
          // 4. IASMOS
          else if (/ΙΑΣΜ|ΑΤΙΑΣ/.test(cleanLine)) {
            totals["Α.Τ. ΙΑΣΜΟΥ"]++;
          }
        });
      }
      function logDebug(msg) {
        const consoleEl = document.getElementById("debug-console");
        consoleEl.value += msg + "\n";
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }

      function renderResults() {
        let sum = 0;
        let html = "<ul>";
        for (let d in totals) {
          html += `<li>${d}: <strong>${totals[d]} items</strong></li>`;
          sum += totals[d];
        }
        html += "</ul><hr>";
        html += `<p>Total: <strong>${sum}</strong></p>`;
        document.getElementById("results").innerHTML = html;
      }

      window.onload = () => {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "../libs/pdfjs-3.11.174/pdf.worker.min.js";
      };
    </script>
  </body>
</html>
