<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel to JSON/CSV Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
      <h1 class="text-2xl font-bold mb-4 text-gray-800">Excel Extractor</h1>

      <div class="flex flex-wrap gap-4 mb-6 items-end">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Upload File (.xlsx, .xls)</label
          >
          <input
            type="file"
            id="fileInput"
            accept=".xlsx, .xls"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
          />
        </div>

        <div class="flex gap-2">
          <button
            onclick="convert('json')"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition"
          >
            To JSON
          </button>
          <button
            onclick="convert('csv')"
            class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"
          >
            To CSV
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Output</label
        >
        <textarea
          id="output"
          readonly
          class="w-full h-96 p-4 font-mono text-sm border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Results will appear here..."
        ></textarea>
      </div>

      <div class="mt-4 flex justify-end">
        <button
          onclick="copyToClipboard()"
          class="text-sm text-blue-600 hover:underline"
        >
          Copy to Clipboard
        </button>
      </div>
    </div>

    <script>
      function convert(format) {
        const fileInput = document.getElementById("fileInput");
        const output = document.getElementById("output");

        if (!fileInput.files[0]) {
          alert("Please select a file first!");
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function (e) {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          let finalResult = "";

          // Loop through every sheet in the Excel file
          workbook.SheetNames.forEach((sheetName) => {
            const worksheet = workbook.Sheets[sheetName];

            // Add a header so you know which sheet the data belongs to
            finalResult += `--- SHEET: ${sheetName} ---\n`;

            if (format === "json") {
              const json = XLSX.utils.sheet_to_json(worksheet);
              finalResult += JSON.stringify(json, null, 2) + "\n\n";
            } else {
              const csv = XLSX.utils.sheet_to_csv(worksheet);
              finalResult += csv + "\n\n";
            }
          });

          output.value = finalResult;
        };

        reader.readAsArrayBuffer(file);
      }
      function copyToClipboard() {
        const copyText = document.getElementById("output");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Copied to clipboard!");
      }
    </script>
  </body>
</html>
