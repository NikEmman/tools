<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <title>Police Department Data Merger</title>
    <script src="../libs/xlsx-0.18.5/xlsx.full.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #f8fafc;
        padding: 2rem;
        font-family: sans-serif;
      }

      .card {
        max-width: 64rem;
        margin: 0 auto;
        background-color: #fff;
        padding: 1.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
        border: 1px solid #e2e8f0;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: #64748b;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      input[type="file"] {
        display: block;
        width: 100%;
        font-size: 0.875rem;
        color: #64748b;
        cursor: pointer;
      }

      input[type="file"]::file-selector-button {
        margin-right: 1rem;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        border: 0;
        font-size: 0.875rem;
        font-weight: 600;
        background-color: #2563eb;
        color: #fff;
        cursor: pointer;
      }

      input[type="file"]::file-selector-button:hover {
        background-color: #1d4ed8;
      }

      #processBtn {
        width: 100%;
        background-color: #059669;
        color: #fff;
        font-weight: 700;
        padding: 0.75rem;
        border-radius: 0.375rem;
        border: none;
        cursor: pointer;
        transition: background-color 150ms ease;
        font-size: 1rem;
      }

      #processBtn:hover {
        background-color: #047857;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 700;
        color: #334155;
        margin-bottom: 0.25rem;
      }

      .textarea-wrapper {
        position: relative;
      }

      textarea {
        width: 100%;
        height: 20rem;
        padding: 1rem;
        padding-right: 3rem;
        font-family: monospace;
        font-size: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background-color: #0f172a;
        color: #34d399;
        outline: none;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: scroll;
        resize: vertical;
      }

      #copyBtn {
        position: absolute;
        bottom: 0.5rem;
        right: 0.5rem;
        padding: 0.5rem;
        border-radius: 0.25rem;
        border: none;
        background-color: #334155;
        color: #cbd5e1;
        cursor: pointer;
        transition: background-color 150ms ease, color 150ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #copyBtn:hover {
        background-color: #475569;
        color: #fff;
      }

      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ΔΙ.ΑΣ. management tool</h1>
      <p class="subtitle">Ανέβασε τα 5 αρχεία excel της κάθε Δ.Α.</p>

      <div class="controls">
        <input
          type="file"
          id="fileInput"
          multiple
          accept=".xlsx, .xls"
        />

        <button id="processBtn" onclick="processFiles()">ΕΚΚΙΝΗΣΗ</button>
      </div>

      <div>
        <label>Ενοποιημένα δεδομένα (CSV Format). Αντιγραφή και επικόλληση στο κεντρικό excel</label>
        <div class="textarea-wrapper">
          <textarea
            id="output"
            readonly
            placeholder="Τα δεδομένα θα εμφανιστούν εδω ..."
          ></textarea>
          <button
            id="copyBtn"
            onclick="copyToClipboard()"
            title="Αντιγραφή"
          >
            <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <svg id="copied-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const targetDepartments = [
        { key: "Δ.Α. ΑΛΕΞ/ΠΟΛΗΣ", search: "ΑΛΕΞ" },
        { key: "Δ.Α. ΡΟΔΟΠΗΣ", search: "ΡΟΔΟΠ" },
        { key: "Δ.Α. ΞΑΝΘΗΣ", search: "ΞΑΝΘ" },
        { key: "Δ.Α. ΚΑΒΑΛΑΣ", search: "ΚΑΒΑΛ" },
        { key: "Δ.Α. ΔΡΑΜΑΣ", search: "ΔΡΑΜΑ" },
      ];

      async function processFiles() {
        const fileInput = document.getElementById("fileInput");
        const output = document.getElementById("output");
        const files = Array.from(fileInput.files);

        if (files.length === 0) {
          alert("Please select at least one file.");
          return;
        }

        let consolidatedData = {};
        targetDepartments.forEach(
          (dept) => (consolidatedData[dept.key] = null),
        );

        for (let file of files) {
          const data = await file.arrayBuffer();
          const workbook = XLSX.read(data, { type: "array" });

          workbook.SheetNames.forEach((sheetName) => {
            const worksheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

            rows.forEach((row) => {
              // Ensure the row has content in the first or second cell
              const cell0 = String(row[0] || "").toUpperCase();
              const cell1 = String(row[1] || "").toUpperCase();
              const combinedLabel = cell0 + " " + cell1;

              targetDepartments.forEach((dept) => {
                // Check if our search term (e.g., "ΞΑΝΘ") exists anywhere in the first two cells
                if (combinedLabel.includes(dept.search)) {
                  // Check for numeric data in the row
                  const hasData = row
                    .slice(2)
                    .some(
                      (cell) =>
                        cell !== null &&
                        cell !== "" &&
                        !isNaN(parseFloat(cell)) &&
                        parseFloat(cell) > 0,
                    );

                  if (hasData) {
                    let cleanedRow = [...row];

                    // If the row started with a blank (Drama style), fix it
                    if (
                      !cleanedRow[0] ||
                      cleanedRow[0].toString().trim() === ""
                    ) {
                      cleanedRow[0] = dept.key;
                      // If column B was also blank, put the City name in (if needed)
                      if (!cleanedRow[1]) cleanedRow[1] = dept.search;
                    } else {
                      // Standardize the name to our key for the final report
                      cleanedRow[0] = dept.key;
                    }

                    consolidatedData[dept.key] = cleanedRow;
                  }
                }
              });
            });
          });
        }

        displayResult(consolidatedData);
      }

      function displayResult(data) {
        const output = document.getElementById("output");

        const rows = targetDepartments.map((dept) => {
          const row = data[dept.key];
          let numericalData = [];

          if (row) {
            for (let i = 2; i <= 21; i++) {
              let val = row[i];
              if (
                val === undefined ||
                val === null ||
                val === "" ||
                val === "-"
              ) {
                numericalData.push("0");
              } else {
                numericalData.push(val);
              }
            }
          } else {
            numericalData = Array(20).fill("0");
          }

          return numericalData.join("\t");
        });

        output.value = rows.join("\n");
        output.select();
      }

      async function copyToClipboard() {
        const output = document.getElementById("output");
        const copyIcon = document.getElementById("copy-icon");
        const copiedIcon = document.getElementById("copied-icon");

        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(output.value);
          } else {
            const textarea = document.createElement("textarea");
            textarea.value = output.value.trim();
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
          }

          copyIcon.classList.add("hidden");
          copiedIcon.classList.remove("hidden");

          setTimeout(() => {
            copyIcon.classList.remove("hidden");
            copiedIcon.classList.add("hidden");
          }, 2000);
        } catch (err) {
          console.error("Failed to copy:", err);
        }
      }
    </script>
  </body>
</html>
